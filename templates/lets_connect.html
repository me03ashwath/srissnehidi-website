{% extends "base.html" %}

{% block title %}Let's Connect — {{ site.name }}{% endblock %}

{% block content %}

<!-- Page Header -->
<section class="bg-black text-white py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <p class="text-[#C9A84C] text-xs uppercase tracking-[0.3em] font-semibold mb-4">Reach Out</p>
    <h1 class="font-serif text-4xl sm:text-5xl font-bold">Let's Connect</h1>
  </div>
</section>

<!-- Contact Cards -->
<section class="py-24 bg-white">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">

      <!-- Phone Card -->
      <a href="tel:{{ site.phone }}"
         class="group block bg-black text-white p-12 text-center border border-gray-800 hover:border-[#C9A84C] transition-all duration-300 hover:shadow-2xl">
        <div class="flex justify-center mb-6">
          <svg class="w-14 h-14 text-[#C9A84C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
        </div>
        <p class="text-[#C9A84C] text-xs uppercase tracking-[0.3em] font-semibold mb-3">Call Us</p>
        <p class="text-white text-lg font-bold group-hover:text-[#C9A84C] transition-colors duration-200">
          {{ site.phone }}
        </p>
      </a>

      <!-- WhatsApp Card -->
      <a href="https://wa.me/{{ site.whatsapp }}"
         class="group block bg-black text-white p-12 text-center border border-gray-800 hover:border-green-500 transition-all duration-300 hover:shadow-2xl">
        <div class="flex justify-center mb-6">
          <svg class="w-14 h-14 text-green-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </div>
        <p class="text-green-500 text-xs uppercase tracking-[0.3em] font-semibold mb-3">Chat With Us</p>
        <p class="text-white text-lg font-bold group-hover:text-green-400 transition-colors duration-200">
          {{ site.phone }}
        </p>
      </a>

    </div>

    <p class="text-center text-gray-500 text-sm italic">
      We typically respond within a few hours
    </p>

  </div>
</section>

{% endblock %}
