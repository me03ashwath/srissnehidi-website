{% extends "base.html" %}

{% block title %}{{ site.name }} — {{ site.tagline }}{% endblock %}

{% block content %}

<section class="hero">
  <div class="container">
    <div class="hero-body">
      <div class="hero-grid">

        <!-- Left: Text -->
        <div>
          <p class="hero-label">Welcome to</p>
          <h1 class="hero-title">{{ site.name }}</h1>
          <p class="hero-tagline">{{ site.tagline }}</p>
          <p class="hero-description">{{ site.about }}</p>
          <a href="{% url 'courses' %}" class="btn-primary">Explore Courses</a>
        </div>

        <!-- Right: Slideshow -->
        <div class="hero-placeholder">
          <div class="slideshow" id="heroSlideshow">
            <img class="slideshow-slide active" src="https://res.cloudinary.com/dmvdowhru/image/upload/1_hbrfzx" alt="">
            <img class="slideshow-slide" src="https://res.cloudinary.com/dmvdowhru/image/upload/2_jc4dq2" alt="">
            <img class="slideshow-slide" src="https://res.cloudinary.com/dmvdowhru/image/upload/3_lxx20h" alt="">
            <img class="slideshow-slide" src="https://res.cloudinary.com/dmvdowhru/image/upload/4_noqbfg" alt="">
            <img class="slideshow-slide" src="https://res.cloudinary.com/dmvdowhru/image/upload/5_mfi2xb" alt="">
            <button class="slideshow-arrow slideshow-arrow-prev" aria-label="Previous slide">&#8249;</button>
            <button class="slideshow-arrow slideshow-arrow-next" aria-label="Next slide">&#8250;</button>
            <div class="slideshow-dots">
              <button class="slideshow-dot active" aria-label="Slide 1"></button>
              <button class="slideshow-dot" aria-label="Slide 2"></button>
              <button class="slideshow-dot" aria-label="Slide 3"></button>
              <button class="slideshow-dot" aria-label="Slide 4"></button>
              <button class="slideshow-dot" aria-label="Slide 5"></button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
(function () {
  var slides = document.querySelectorAll('#heroSlideshow .slideshow-slide');
  var dots   = document.querySelectorAll('#heroSlideshow .slideshow-dot');
  var current = 0;
  var timer;

  function goTo(index) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function startTimer() {
    timer = setInterval(function () { goTo(current + 1); }, 4000);
  }

  function resetTimer() {
    clearInterval(timer);
    startTimer();
  }

  document.querySelector('#heroSlideshow .slideshow-arrow-prev').addEventListener('click', function () {
    goTo(current - 1);
    resetTimer();
  });

  document.querySelector('#heroSlideshow .slideshow-arrow-next').addEventListener('click', function () {
    goTo(current + 1);
    resetTimer();
  });

  dots.forEach(function (dot, i) {
    dot.addEventListener('click', function () {
      goTo(i);
      resetTimer();
    });
  });

  startTimer();
})();
</script>

{% endblock %}
