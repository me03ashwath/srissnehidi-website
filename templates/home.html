{% extends "base.html" %}

{% block title %}{{ site.name }} — {{ site.tagline }}{% endblock %}

{% block content %}

<section class="hero">
  <div class="container">
    <div class="hero-body">
      <div class="hero-grid">

        <!-- Left: Text -->
        <div>
          <p class="hero-label">Welcome to</p>
          <h1 class="hero-title">{{ site.name }}</h1>
          <p class="hero-tagline">{{ site.tagline }}</p>
          <p class="hero-description">{{ site.about }}</p>
          <a href="{% url 'courses' %}" class="btn-primary">Explore Courses</a>
        </div>

        <!-- Right: Placeholder -->
        <div class="hero-placeholder">
          <div class="hero-placeholder-box">
            <div class="hero-divider"></div>
            <p class="hero-placeholder-text">Institute Photo / Video here</p>
            <div class="hero-divider"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

{% endblock %}
